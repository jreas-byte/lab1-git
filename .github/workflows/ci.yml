name: Python CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Отримати код
        uses: actions/checkout@v4

      - name: Встановити Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Встановити залежності
        run: |
          python -m pip install --upgrade pip
          pip install -r lab7/requirements.txt

      - name: Перевірити стиль коду
        run: flake8 lab7/app.py lab7/test_app.py

      - name: Запустити doctest
        run: python -m doctest lab7/app.py -v

      - name: Запустити unit-тести
        run: python -m unittest lab7/test_app.py
